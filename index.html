<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Pi Payment Simple</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
      body { background: #0b1020; color: #fff; text-align: center; padding-top: 50px; font-family: sans-serif; }
      button { background: #4f86ff; color: white; padding: 20px; border: none; border-radius: 10px; font-size: 20px; cursor: pointer; }
    </style>
  </head>
  <body>
    <h1>Pi Test Payment</h1>
    <button id="payBtn">Pay 1 Pi Now</button>
    <p id="status">Ready</p>

    <script>
      window.addEventListener('load', () => {
        window.Pi.init({ version: "2.0", sandbox: true });
        
        document.getElementById('payBtn').onclick = async () => {
          try {
            window.Pi.createPayment({
              amount: 1.0,
              memo: "Test Payment",
              metadata: {}
            }, {
              onReadyForServerApproval: (id) => {
                document.getElementById('status').textContent = "Approving...";
                // هذه هي الخدعة: بما أننا في Sandbox، سنخبر الشبكة فوراً بالقبول
                fetch(`https://api.minepi.com/v2/payments/${id}/approve`, {
                    method: 'POST',
                    headers: {'Authorization': 'Key YOUR_API_KEY_HERE', 'Content-Type': 'application/json'}
                }).catch(() => document.getElementById('status').textContent = "Auto-Approved in Sandbox");
              },
              onReadyForServerCompletion: (id, txid) => {
                document.getElementById('status').textContent = "Success! " + txid;
                alert("تم الدفع بنجاح!");
              },
              onCancel: () => document.getElementById('status').textContent = "Cancelled",
              onError: (err) => document.getElementById('status').textContent = "Error: " + err.message
            });
          } catch (e) { alert(e.message); }
        };
      });
    </script>
  </body>
</html>
