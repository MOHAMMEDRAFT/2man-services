<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Pi Payment App</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <script>
      // تهيئة الـ SDK بمجرد تحميل الصفحة
      window.addEventListener('load', function() {
        if (window.Pi) {
          window.Pi.init({ version: "2.0", sandbox: true });
          console.log("Pi SDK Initialized in Sandbox mode");
        }
      });
    </script>
    <style>
      body { margin: 0; padding: 0; background: #0b1020; color: #fff; font-family: sans-serif; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; text-align: center; }
      .pay-btn { background: #4f86ff; color: #fff; border: none; padding: 15px 30px; font-size: 18px; border-radius: 10px; cursor: pointer; margin-top: 20px; }
      #status { margin-top: 20px; color: #facc15; }
    </style>
  </head>
  <body>
    <h1>2man Services</h1>
    <div id="usernameDisplay">Welcome, Guest</div>
    <button id="payBtn" class="pay-btn">Support 1 Pi</button>
    <div id="status">Ready</div>

    <script>
      const btn = document.getElementById('payBtn');
      const statusEl = document.getElementById('status');
      const userEl = document.getElementById('usernameDisplay');

      async function startAuth() {
        try {
          const auth = await window.Pi.authenticate(["username", "payments"], (incomplete) => {
             console.log("Incomplete payment", incomplete);
          });
          userEl.textContent = "Welcome, " + auth.user.username;
          statusEl.textContent = "Authenticated!";
        } catch (e) {
          statusEl.textContent = "Auth Error: " + e.message;
        }
      }

      btn.onclick = async () => {
        try {
          statusEl.textContent = "Creating payment...";
          const paymentData = {
            amount: 1.0,
            memo: "Support Service",
            metadata: { kind: "test" }
          };

          const callbacks = {
            onReadyForServerApproval: (id) => statusEl.textContent = "Waiting for Approval: " + id,
            onReadyForServerCompletion: (id, txid) => statusEl.textContent = "Completed! TXID: " + txid,
            onCancel: () => statusEl.textContent = "Cancelled",
            onError: (err) => statusEl.textContent = "Error: " + err.message
          };

          window.Pi.createPayment(paymentData, callbacks);
        } catch (e) {
          statusEl.textContent = "Payment Error: " + e.message;
        }
      };

      // بدء المصادقة عند التحميل
      setTimeout(startAuth, 1000);
    </script>
  </body>
</html>
