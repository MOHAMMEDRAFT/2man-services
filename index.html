<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>2man Services</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
      body { background: #0b1020; color: #fff; text-align: center; font-family: sans-serif; padding: 20px; }
      button { background: #4f86ff; color: white; padding: 15px 30px; border: none; border-radius: 10px; font-size: 18px; cursor: pointer; }
      #status { margin-top: 20px; color: #facc15; }
    </style>
  </head>
  <body>
    <h1>2man Services</h1>
    <div id="userDisplay">Connecting...</div>
    <button id="payBtn">Support 1 Pi</button>
    <p id="status">Status: Ready</p>

    <script>
      const btn = document.getElementById('payBtn');
      const statusEl = document.getElementById('status');
      const userEl = document.getElementById('userDisplay');

      window.addEventListener('load', () => {
        window.Pi.init({ version: "2.0", sandbox: true });
        startAuth();
      });

      async function startAuth() {
        try {
          const auth = await window.Pi.authenticate(["username", "payments"], (incomplete) => {
             console.log("Incomplete payment", incomplete);
          });
          userEl.textContent = "User: " + auth.user.username;
        } catch (e) { statusEl.textContent = "Auth Error: " + e.message; }
      }

      btn.onclick = async () => {
        statusEl.textContent = "Waiting for Pi Network...";
        window.Pi.createPayment({
          amount: 1.0,
          memo: "Support 2man Services",
          metadata: { kind: "support" }
        }, {
          onReadyForServerApproval: (id) => statusEl.textContent = "Payment ID: " + id + " - Waiting for approval",
          onReadyForServerCompletion: (id, txid) => statusEl.textContent = "Transaction Completed: " + txid,
          onCancel: () => statusEl.textContent = "Payment Cancelled",
          onError: (err) => statusEl.textContent = "Error: " + err.message
        });
      };
    </script>
  </body>
</html>
